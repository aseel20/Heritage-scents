<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | Heritage Scents</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">

    <div class="logo">Heritage Scents</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Collection</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="checkout.html">Checkout</a></li>
    </ul>

</nav>

<section class="checkout-hero">

    <div class="overlay">
        <h1>Checkout</h1>
        <p>Complete your order and experience timeless luxury.</p>
    </div>

</section>

<section class="checkout-container">

    <div class="checkout-form">

        <h2>Shipping Details</h2>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">

            <label>Shipping Address</label>
            <textarea placeholder="Enter your address"></textarea>

            <label>City</label>
            <input type="text">

            <label>Country</label>
            <input type="text">

            <button type="submit" class="checkout-btn">
                Place Order
            </button>

        </form>

    </div>

    <div class="order-summary">

        <h2>Order Summary</h2>

        <div class="summary-item">
            <span>Vintage Rose</span>
            <span>$120</span>
        </div>

        <div class="summary-item">
            <span>Golden Oud</span>
            <span>$145</span>
        </div>

        <hr>

        <div class="summary-total">
            <span>Total</span>
            <span>$265</span>
        </div>

    </div>

</section>

</body>

</html>
